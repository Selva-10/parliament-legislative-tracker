{% extends 'tracker/base.html' %}
{% load static %}

{% block title %}Bills Calendar - Parliament Tracker{% endblock %}

{% block extra_css %}
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
<style>
    #calendar {
        max-width: 1100px;
        margin: 0 auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
        min-height: 500px;
    }
    .fc-event {
        cursor: pointer;
        border-radius: 4px;
        padding: 2px 4px;
        font-size: 0.75rem;
        border: none !important;
        color: white !important;
    }
    .central-event {
        background-color: #1a237e !important;
    }
    .state-event {
        background-color: #28a745 !important;
    }
    .stats-row {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    .stat-card {
        flex: 1;
        min-width: 150px;
        background: #1a237e;
        color: white;
        border-radius: 8px;
        padding: 15px;
        text-align: center;
    }
    .stat-card.state { background: #28a745; }
    .stat-number { font-size: 1.8rem; font-weight: bold; }
    .filter-bar {
        background: white;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        align-items: center;
    }
    select, button {
        padding: 8px 15px;
        border-radius: 5px;
        border: 1px solid #ddd;
    }
    .btn-primary {
        background: #1a237e;
        color: white;
        border: none;
        cursor: pointer;
    }
    .legend {
        display: flex;
        gap: 20px;
        align-items: center;
        margin-bottom: 15px;
        padding: 10px;
        background: #f8f9fa;
        border-radius: 8px;
    }
    .legend-color {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        display: inline-block;
        margin-right: 5px;
    }
    .legend-color.blue { background-color: #1a237e; }
    .legend-color.green { background-color: #28a745; }
    .view-buttons {
        display: flex;
        gap: 10px;
        margin-left: auto;
    }
    .view-btn {
        padding: 6px 12px;
        border: 1px solid #ddd;
        background: white;
        cursor: pointer;
        border-radius: 4px;
    }
    .view-btn.active {
        background: #1a237e;
        color: white;
        border-color: #1a237e;
    }
    .fc-header-toolbar {
        margin-bottom: 20px !important;
    }
    .fc-toolbar-title {
        font-size: 1.2rem !important;
        font-weight: 600 !important;
    }
    /* Hide time slots in week view */
    .fc-timegrid-slot {
        display: none !important;
    }
    .fc-timegrid-slot-label {
        display: none !important;
    }
    .fc-timegrid-slot-minor {
        display: none !important;
    }
    .fc-timegrid-col-events {
        margin-top: 0 !important;
    }
    .fc-timegrid-event {
        min-height: 30px !important;
    }
    .fc-timegrid .fc-daygrid-day-frame {
        min-height: 80px !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4">Bills Calendar</h1>

    <div class="legend">
        <div><span class="legend-color blue"></span> 🏛️ Central Bills (MPA)</div>
        <div><span class="legend-color green"></span> 🏢 State Bills</div>
        <div class="view-buttons">
            <button class="view-btn" data-view="dayGridMonth">📅 Month</button>
            <button class="view-btn" data-view="timeGridWeek">📆 Week</button>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-number" id="centralCount">0</div>
            <div>Central Bills</div>
        </div>
        <div class="stat-card state">
            <div class="stat-number" id="stateCount">0</div>
            <div>State Bills</div>
        </div>
    </div>

    <div class="filter-bar">
        <select id="billType">
            <option value="all">📋 All Bills</option>
            <option value="central">🏛️ Central Bills Only</option>
            <option value="state">🏢 State Bills Only</option>
        </select>
        <select id="statusFilter">
            <option value="all">📊 All Status</option>
            <option value="PASSED">✅ Passed</option>
            <option value="PENDING">⏳ Pending</option>
        </select>
        <button id="refreshBtn" class="btn-primary">🔄 Refresh</button>
    </div>

    <div class="card">
        <div class="card-body">
            <div id="calendar"></div>
        </div>
    </div>
</div>

<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
<script>
(function() {
    let calendar = null;
    let currentView = 'dayGridMonth';
    
    function loadCalendar() {
        const billType = document.getElementById('billType').value;
        const status = document.getElementById('statusFilter').value;
        
        let url = '/api/bills/?limit=5000';
        if (billType === 'central') url += '&source=MPA';
        if (billType === 'state') url += '&source=STATE_BILL';
        if (status !== 'all') url += `&status=${status}`;
        
        fetch(url)
            .then(res => res.json())
            .then(data => {
                const bills = data.bills || [];
                let centralCount = 0, stateCount = 0;
                const events = [];
                
                bills.forEach(bill => {
                    if (!bill.introduction_date) return;
                    
                    if (bill.source === 'MPA') centralCount++;
                    else if (bill.source === 'STATE_BILL') stateCount++;
                    
                    events.push({
                        id: bill.id,
                        title: bill.title.length > 40 ? bill.title.substring(0, 37) + '...' : bill.title,
                        start: bill.introduction_date,
                        className: bill.source === 'MPA' ? 'central-event' : bill.source === 'STATE_BILL' ? 'state-event' : '',
                        extendedProps: bill
                    });
                });
                
                document.getElementById('centralCount').innerText = centralCount;
                document.getElementById('stateCount').innerText = stateCount;
                
                if (calendar) calendar.destroy();
                
                calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                    initialView: currentView,
                    headerToolbar: {
                        left: 'prev,next today',
                        center: 'title',
                        right: ''
                    },
                    buttonText: {
                        today: 'Today',
                        prev: '◀',
                        next: '▶'
                    },
                    views: {
                        dayGridMonth: {
                            buttonText: 'Month',
                            displayEventTime: false
                        },
                        timeGridWeek: {
                            buttonText: 'Week',
                            displayEventTime: false,
                            displayEventEnd: false,
                            slotDuration: '24:00:00',
                            allDaySlot: true,
                            slotMinTime: '00:00:00',
                            slotMaxTime: '24:00:00'
                        }
                    },
                    events: events,
                    eventClick: function(info) {
                        const bill = info.event.extendedProps;
                        const isCentral = bill.source === 'MPA';
                        alert(`📋 BILL DETAILS\n\nTitle: ${bill.title}\nType: ${isCentral ? '🏛️ Central Bill' : '🏢 State Bill'}\nStatus: ${bill.status}\nDate: ${bill.introduction_date}\n${isCentral ? 'House: ' + bill.house : 'State: ' + (bill.state || 'N/A')}`);
                    },
                    height: 550,
                    stickyHeaderDates: true
                });
                
                calendar.render();
                
                document.querySelectorAll('.view-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.view === currentView) {
                        btn.classList.add('active');
                    }
                });
            })
            .catch(err => console.error('Error:', err));
    }
    
    document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            currentView = this.dataset.view;
            if (calendar) {
                calendar.destroy();
                loadCalendar();
            }
        });
    });
    
    document.getElementById('refreshBtn').onclick = loadCalendar;
    document.getElementById('billType').onchange = loadCalendar;
    document.getElementById('statusFilter').onchange = loadCalendar;
    
    loadCalendar();
})();
</script>
{% endblock %}
